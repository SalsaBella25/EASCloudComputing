version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: skinscan_db
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Menggunakan root password sesuai .env jika ada, jika tidak izinkan kosong
      MYSQL_ROOT_PASSWORD: "${DB_PASS:-}"
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes" # Diperlukan karena server.js menggunakan password kosong
      MYSQL_DATABASE: "${DB_NAME:-skinscan_db}"
    # Mengekspos port 3306 untuk DB, dan port 3000 untuk App
    # Port app (3000) diekspos melalui service db karena container app menggunakan network_mode service ini.
    ports:
      - "3306:3306"
      - "3000:3000"
      - "8080:80" # Port Frontend
    volumes:
      # Mapping file SQL untuk menginisialisasi skema saat pertama kali build
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
      # Volume untuk persistensi data MySQL
      - db_data:/var/lib/mysql

  app:
    build: ./backend
    container_name: skinscan_app
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000
    depends_on:
      - db
    # TRIK CLOUD NATIVE / SIDECAR PATTERN:
    # Karena file `server.js` tidak boleh diubah (masih hardcode ke 'localhost'),
    # kita gunakan network_mode "service:db". Dengan konfigurasi ini, container 
    # Node.js akan berada di namespace jaringan yang sama dengan container MySQL.
    # Sehingga Node.js dapat terhubung ke MySQL menggunakan 'localhost' dengan aman.
    network_mode: "service:db"
    volumes:
      - ./backend/uploads:/usr/src/app/uploads

  frontend:
    image: nginx:alpine
    container_name: skinscan_frontend
    restart: unless-stopped
    network_mode: "service:db"
    volumes:
      - ./Frontend:/usr/share/nginx/html

volumes:
  db_data:
